<style>
  :root{
    --ph-red:#C4203C;
    --ph-red-deep:#9c1a30;
    --ph-red-soft:#f7dfe3;
    --ph-ink:#1b1b1b;
    --ph-black:#161616;
    --ph-gray:#9a9a9a;
    --ph-gray-line:#dcdcdc;
    --slab:'Mulish', system-ui, sans-serif;
    --sans:'Mulish', system-ui, sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
  /* buttons inherit text colour/font so iOS doesn't tint unstyled labels blue */
  button{color:inherit;font-family:inherit;}
  /* iOS-style press feedback */
  .ph-tap{transition:transform .12s ease, opacity .12s ease;}
  .ph-tap:active{transform:scale(.84);}
  .ph-tap-op{transition:opacity .14s ease;}
  .ph-tap-op:active{opacity:.6;}
  html,body{
    margin:0;padding:0;
    overscroll-behavior:none;            /* kill rubber-band chaining */
    -webkit-user-select:none;user-select:none;  /* native: no text selection */
    touch-action:manipulation;           /* remove 300ms tap delay */
    /* On this device 100% / 100dvh = 793 (59px short of the screen) while
       100vh = 852 = the full physical screen. In a standalone PWA there's no
       browser toolbar, so 100vh is the correct full-screen height. */
    height:100vh;
    background:#fff;
  }
  body{
    background:#fff;
    font-family:var(--sans);
    color:var(--ph-ink);
    height:100vh;
    overflow:hidden;
  }
  /* On wider screens the app is a centered phone-width column — frame it on dark */
  @media (min-width:481px){ body{ background:#161616; } }
  /* allow selection only where it would be expected (none here, but keep hook) */
  .selectable{-webkit-user-select:text;user-select:text;}
  #stage{
    width:100%;height:100vh;
    display:flex;align-items:stretch;justify-content:center;
  }
  /* ---------- App viewport: full-bleed; centered phone-width column on desktop ---------- */
  .phone{
    position:relative;
    width:100%;max-width:480px;
    height:100vh;
    background:#fff;
    overflow:hidden;
    flex:none;
    display:flex;flex-direction:column;
  }
  .screen{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    background:#fff;
    overflow:hidden;
  }
  /* generic scroll body */
  .body{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  .body::-webkit-scrollbar{width:0;}
  /* hide things */
  .vis-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}
  #root{width:100%;height:100vh;}

  /* ====== Real-device safe areas (notch + home swipe area) ====== */
  /* Black header fills the top inset; min keeps breathing room in a browser tab */
  .ph-header{padding-top:max(env(safe-area-inset-top), 12px);background:var(--ph-black);}
  /* Lift the tab bar above the device home-swipe area */
  .ph-bottomnav{padding-bottom:env(safe-area-inset-bottom);}
  .ph-safe-top{padding-top:env(safe-area-inset-top);background:var(--ph-black);}

  /* ====== Launch / splash screen (shown on every open, then fades out) ====== */
  #ph-splash{
    /* 100vh = full physical screen on iOS standalone (100%/dvh fall ~59px short) */
    position:fixed;top:0;left:0;width:100%;height:100vh;z-index:9999;background:#161616;
    display:flex;align-items:stretch;justify-content:center;
    transition:opacity .55s ease;
  }
  #ph-splash.ph-splash-hide{opacity:0;pointer-events:none;}
  #ph-splash .ph-splash-img{
    width:100%;max-width:480px;
    background:#161616 center/cover no-repeat;
    background-image:url('assets/IMG_3592.jpg');
  }

  /* ====== Portrait lock: cover the app with a "rotate" notice when a phone is
     held in landscape (iOS ignores the manifest orientation lock). Only triggers
     on short landscape viewports so desktop / tablets are unaffected. ====== */
  #ph-rotate{display:none;}
  @media (orientation:landscape) and (max-height:500px){
    #ph-rotate{
      display:flex;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:100000;
      background:var(--ph-black);color:#fff;flex-direction:column;
      align-items:center;justify-content:center;gap:18px;padding:24px;text-align:center;
    }
  }
  #ph-rotate .ph-rotate-t{font-family:var(--slab);font-weight:800;font-size:22px;}
  #ph-rotate .ph-rotate-s{font-family:var(--sans);font-size:15px;color:#b9b9c0;max-width:300px;line-height:1.45;}
</style>

/* ---- QR code (deterministic pseudo-QR, looks real) ---- */
function QRCode({ size = 220, value = "PALM-HILLS" }) {
  // Real, scannable QR when the encoder loaded; decorative fallback otherwise.
  if (typeof window !== "undefined" && typeof window.qrcode === "function") {
    try {
      const qr = window.qrcode(0, "M");
      qr.addData(String(value));
      qr.make();
      const count = qr.getModuleCount();
      const cell = size / count;
      const rects = [];
      for (let r = 0; r < count; r++) {
        for (let c = 0; c < count; c++) {
          if (qr.isDark(r, c)) rects.push(<rect key={r + "-" + c} x={(c * cell).toFixed(2)} y={(r * cell).toFixed(2)} width={Math.ceil(cell)} height={Math.ceil(cell)} fill="#161616" />);
        }
      }
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} shapeRendering="crispEdges" style={{ display: "block" }}>
          <rect width={size} height={size} fill="#fff" />
          {rects}
        </svg>
      );
    } catch (e) { /* fall through to decorative pattern */ }
  }
  const N = 29;
  // deterministic PRNG seeded from value
  let seed = 0; for (let i = 0; i < value.length; i++) seed = (seed * 31 + value.charCodeAt(i)) >>> 0;
  const rnd = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
  const finder = (r, c) =>
    (r >= 0 && r < 7 && c >= 0 && c < 7) &&
    (r === 0 || r === 6 || c === 0 || c === 6 || (r >= 2 && r <= 4 && c >= 2 && c <= 4));
  const inFinderZone = (r, c) => (r < 8 && c < 8) || (r < 8 && c >= N - 8) || (r >= N - 8 && c < 8);
  const cell = size / N;
  const rects = [];
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      let on = false;
      if (r < 7 && c < 7) on = finder(r, c);
      else if (r < 7 && c >= N - 7) on = finder(r, c - (N - 7));
      else if (r >= N - 7 && c < 7) on = finder(r - (N - 7), c);
      else if (inFinderZone(r, c)) on = false;
      else on = rnd() > 0.5;
      if (on) rects.push(<rect key={r + "-" + c} x={(c * cell).toFixed(2)} y={(r * cell).toFixed(2)} width={Math.ceil(cell) } height={Math.ceil(cell)} fill="#161616" />);
    }
  }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} shapeRendering="crispEdges" style={{ display: "block" }}>
      <rect width={size} height={size} fill="#fff" />
      {rects}
    </svg>
  );
}

/* Biometric (Face ID / Touch ID) confirmation modal.
   Uses the real WebAuthn platform authenticator when available so it triggers
   the device's native Face ID / Touch ID prompt; falls back to proceeding on
   platforms without it. */
function BiometricModal({ onSuccess, onCancel }) {
  const [busy, setBusy] = React.useState(false);
  const authenticate = async () => {
    if (busy) return;
    setBusy(true);
    let ok = true;
    try {
      if (window.PublicKeyCredential && navigator.credentials && navigator.credentials.create) {
        const challenge = new Uint8Array(32);
        const userId = new Uint8Array(16);
        (window.crypto || {}).getRandomValues && window.crypto.getRandomValues(challenge);
        (window.crypto || {}).getRandomValues && window.crypto.getRandomValues(userId);
        await navigator.credentials.create({
          publicKey: {
            challenge,
            rp: { name: "Palm Hills" },
            user: { id: userId, name: "kareem.ali", displayName: "Kareem Sabri" },
            pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
            timeout: 60000,
            attestation: "none",
          },
        });
      }
      // If WebAuthn isn't supported, ok stays true (demo proceeds).
    } catch (e) {
      ok = false;   // user cancelled or verification failed
      setBusy(false);
    }
    if (ok) onSuccess();
  };
  return (

/* ---------------- APP ---------------- */
function App() {
  const [tab, setTab] = useS("space");        // active bottom tab
  const [stack, setStack] = useS([]);          // navigation stack of sub-page keys
  const [closing, setClosing] = useS(false);   // sub-page pop (slide-out) in progress
  const [sheet, setSheet] = useS(null);        // "switch" | null
  const [bio, setBio] = useS(false);           // biometric modal (gate-pass generation)
  const [loading, setLoading] = useS(false);   // diamond page-transition loader
  const [lang, setLangState] = useS(() => { try { return localStorage.getItem("ph_lang") || "en"; } catch (e) { return "en"; } });
  _lang = lang;                                // sync module flag before children render
  const rtl = lang === "ar";
  const time = tab === "hills" || tab === "more" ? "7:47" : "7:51";
  const top = stack[stack.length - 1] || null;

  // keep the document direction in sync with the chosen language
  React.useEffect(() => {
    document.documentElement.setAttribute("dir", rtl ? "rtl" : "ltr");
    document.documentElement.setAttribute("lang", lang);
  }, [lang, rtl]);
  const changeLang = (l) => { try { localStorage.setItem("ph_lang", l); } catch (e) {} setLangState(l); };

  // run fn behind a brief diamond loading screen (used for bottom-tab switches)
  const withLoad = (fn, ms = 620) => {
    setLoading(true);
    window.setTimeout(() => { fn && fn(); setLoading(false); }, ms);
  };

  // bottom-tab switch → diamond loader (resets the sub-page stack)
  const nav = (k) => withLoad(() => { setSheet(null); setStack([]); setClosing(false); setTab(k); });
  // sub-page push (slide in from right) / pop (slide out to right) — native iOS nav
  const pushPage = (k) => { setSheet(null); setClosing(false); setStack((s) => [...s, k]); };
  const popPage = () => { setClosing(true); window.setTimeout(() => { setStack((s) => s.slice(0, -1)); setClosing(false); }, 300); };
  const openPass = () => { setSheet(null); setClosing(false); setStack(["myPass"]); };
  const openSwitch = () => setSheet("switch");
  const openBell = () => pushPage("notifFeed");
  const selectCompound = () => withLoad(() => setSheet(null));
  // Generate New Pass → confirm with biometrics, then reveal the pass
  const generatePass = () => setBio(true);
  const onBioSuccess = () => { setBio(false); withLoad(() => openPass()); };

  let main;
  if (tab === "hills") main = <ScreenHills time={time} onBell={openBell} />;
  else if (tab === "space") main = <ScreenSpace time={time} onMyUnits={() => pushPage("myUnits")} onGenerate={generatePass} onSwitch={openSwitch} onBell={openBell} />;
  else if (tab === "community") main = <ScreenCommunity time={time} onSwitch={openSwitch} onBell={openBell} />;
  else main = <ScreenMore time={time} onMyUsers={() => pushPage("myUsers")} onSettings={() => pushPage("settings")} onBell={openBell} onTile={pushPage} />;

  // map a stack key → its page element
  const renderPage = (key) => {
    switch (key) {
      case "myUnits": return <ScreenMyUnits time={time} onBack={popPage} onSwitch={openSwitch} onUnit={() => pushPage("unitDetails")} />;
      case "unitDetails": return <ScreenUnitDetails time={time} onBack={popPage} />;
      case "myPass": return <ScreenMyPass time={time} onSwitch={openSwitch} onBell={openBell} />;
      case "notifFeed": return <ScreenNotificationFeed time={time} onBack={popPage} />;
      case "myUsers": return <ScreenMyUsers time={time} onBack={popPage} />;
      case "invitations": return <ScreenMyInvitations time={time} onBack={popPage} />;
      case "vehicles": return <ScreenMyVehicles time={time} onBack={popPage} />;
      case "reservations": return <ScreenMyReservations time={time} onBack={popPage} />;
      case "settings": return <ScreenSettings time={time} onBack={popPage} onProfile={() => pushPage("profile")} onNotifications={() => pushPage("notifications")} onLanguage={() => pushPage("appLanguage")} onPrivacy={() => pushPage("privacy")} onTerms={() => pushPage("terms")} />;
      case "profile": return <ScreenProfile time={time} onBack={popPage} onEditPassword={() => pushPage("changePassword")} />;
      case "changePassword": return <ScreenChangePassword time={time} onBack={popPage} />;
      case "notifications": return <ScreenNotifications time={time} onBack={popPage} />;
      case "appLanguage": return <ScreenAppLanguage time={time} onBack={popPage} lang={lang} onChangeLang={changeLang} />;
      case "privacy": return <ScreenPolicy time={time} onBack={popPage} title="PRIVACY POLICY" />;
      case "terms": return <ScreenPolicy time={time} onBack={popPage} title="TERMS OF USE" />;
      default: return null;
    }
  };

  // base tab stays shifted while any sub-page remains after the in-flight pop
  const baseShift = stack.length > (closing ? 1 : 0);

  return (
    <div className="phone" dir={rtl ? "rtl" : "ltr"}>
      {/* content region — fills above the nav; the loader/overlays live here so
          they never cover the bottom nav */}
      <div style={{ flex: 1, position: "relative", minHeight: 0, overflow: "hidden", zIndex: 0 }}>
        {/* base tab screen — parallaxes left + dims behind a pushed sub-page */}
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", transition: "transform .3s cubic-bezier(.32,.72,0,1), filter .3s ease", transform: baseShift ? "translateX(-24%)" : "translateX(0)", filter: baseShift ? "brightness(.72)" : "none" }}>
          <div style={{ flex: 1, minHeight: 0, display: "flex" }}>{main}</div>
        </div>

        {/* full-page views as a stack — each slides like native iOS push/pop. */}
        {stack.map((key, i) => (
          <Overlay key={i} closing={closing && i === stack.length - 1} onSwipeBack={i === stack.length - 1 ? popPage : null}>{renderPage(key)}</Overlay>
        ))}

        {/* diamond page-transition loader — covers content only, not the nav */}
        {loading && <DiamondLoader />}
      </div>

      {/* bottom nav — a normal flex child pinned at the bottom of the full-height
          column (no fixed positioning → no iOS standalone bottom gap) */}
      <BottomNav
        active={top === "myPass" ? "pass" : tab}
        onNav={nav}
        onPass={openPass}
      />

      {/* Switch Compound bottom sheet (covers the whole screen incl. nav) */}
      {sheet === "switch" && (
        <SwitchSheet onClose={() => setSheet(null)} onSelect={selectCompound} />
      )}

      {/* Biometric confirmation before generating a new gate pass */}
      {bio && (
        <BiometricModal onSuccess={onBioSuccess} onCancel={() => setBio(false)} />
      )}
    </div>
  );
}

function Overlay({ children, closing, onSwipeBack }) {
  // edge-swipe back gesture (start near the leading edge, drag toward trailing)
  const drag = React.useRef(null);
  const onTouchStart = (e) => {
    if (!onSwipeBack) { drag.current = null; return; }
    const x = e.touches[0].clientX, w = window.innerWidth;
    const fromEdge = isRTL() ? (w - x < 44) : (x < 44);
    drag.current = fromEdge ? { x, y: e.touches[0].clientY } : null;
  };
  const onTouchEnd = (e) => {
    if (!drag.current || !onSwipeBack) return;
    const tch = e.changedTouches[0];
    const dx = tch.clientX - drag.current.x;
    const dy = Math.abs(tch.clientY - drag.current.y);
    const back = isRTL() ? dx < -70 : dx > 70;
    if (back && dy < 70) onSwipeBack();
    drag.current = null;
  };
  return (
    <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
      style={{ position: "absolute", inset: 0, zIndex: 20, background: "#fff", boxShadow: "-12px 0 28px -10px rgba(0,0,0,.35)", animation: (closing ? "slideOut" : "slideIn") + " .3s cubic-bezier(.32,.72,0,1) both" }}>
      {children}
    </div>
  );
}

const styleEl = document.createElement("style");
styleEl.textContent = `
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideOut{from{transform:translateX(0)}to{transform:translateX(100%)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.hscroll::-webkit-scrollbar{height:0;width:0;}
.hscroll{scrollbar-width:none;-ms-overflow-style:none;}
.ph-loader{position:absolute;inset:0;z-index:25;background:rgba(255,255,255,.96);display:flex;align-items:center;justify-content:center;}
.ph-loader-diamond{width:60px;height:60px;animation:phSpin 1.05s cubic-bezier(.45,.05,.35,1) infinite;}
@keyframes phSpin{0%{transform:rotate(0) scale(.86);opacity:.55}50%{transform:rotate(180deg) scale(1.08);opacity:1}100%{transform:rotate(360deg) scale(.86);opacity:.55}}
.ph-sheet-wrap{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.45);display:flex;flex-direction:column;justify-content:flex-end;animation:fadeIn .2s ease;}
.ph-sheet{background:#fff;border-top-left-radius:0;border-top-right-radius:0;padding:24px 24px calc(20px + env(safe-area-inset-bottom));animation:sheetUp .32s cubic-bezier(.2,.7,.2,1);}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes sheetDown{from{transform:translateY(0)}to{transform:translateY(100%)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
`;
document.head.appendChild(styleEl);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

/* Dismiss the launch screen once (a) the app has mounted, (b) the launch
   image has actually loaded so it's been seen, and (c) a brief minimum time
   has passed — whichever resolves, but never longer than a hard cap. */
(function () {
  var splash = document.getElementById("ph-splash");
  if (!splash) return;
  var MIN_MS = 1700;   // minimum on-screen time so it reads as a launch picture
  var CAP_MS = 6000;   // never block the app longer than this
  var start = window.__phStart || Date.now();
  var done = false;

  function fadeOut() {
    if (done) return;
    done = true;
    // flip the home-indicator strip from splash-dark to app-white
    document.documentElement.style.backgroundColor = "#fff";
    splash.classList.add("ph-splash-hide");
    window.setTimeout(function () { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 650);
  }

  // Resolve image load (uses the same cached file as the CSS background / preload).
  var imgLoaded = false;
  var pre = new Image();
  pre.onload = pre.onerror = function () { imgLoaded = true; };
  pre.src = "assets/IMG_3592.jpg";
  if (pre.complete) imgLoaded = true;

  function maybeDismiss() {
    if (done) return;
    var elapsed = Date.now() - start;
    if (imgLoaded && elapsed >= MIN_MS) fadeOut();
    else window.setTimeout(maybeDismiss, 120);
  }
  requestAnimationFrame(function () { requestAnimationFrame(maybeDismiss); });
  window.setTimeout(fadeOut, CAP_MS);   // safety net
})();


  </script>
